<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{title} | fridge.dev</title>
    <meta name="description" content="{description}">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preload" href="/resources/IBM_VGA.woff" as="font" type="font/woff" crossorigin>
    <link rel="preload" href="/resources/IosevkaFixedSS03-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="/style.css?v=mobile-20260713-5">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">

    <!-- favicons + app formatting -->
    <link rel="icon" type="image/png" href="/resources/favicon-96x96.png" sizes="96x96" />
    <!-- <link rel="icon" type="image/svg+xml" href="/resources/favicon.svg" /> -->
    <link rel="shortcut icon" href="/resources/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/resources/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="fridge.dev" />
    <link rel="manifest" href="/resources/site.webmanifest" />
    <style>
        body {
            width: 100%;
            min-height: 100dvh;
            height: auto;
            overflow-x: hidden;
            overflow-y: auto;
        }

        #page-wrapper {
            width: 100%;
            min-height: 100dvh;
            height: auto;
            display: block;
        }

        #show-sidebar {
            position: static;
            top: 10px;
            left: 10px;
            padding: 7px 9px;
            font-size: 15px;
            border: 1px solid var(--border);
            border-radius: 0px;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(10px);
            margin: 10px 14px 0 14px;
            z-index: auto;
        }

        .mobile-collapsed-header {
            display: none;
            align-items: center;
            gap: 10px;
            margin: 10px 14px 0 14px;
        }

        .mobile-collapsed-header #show-sidebar {
            margin: 0;
            flex: 0 0 auto;
        }

        .mobile-collapsed-brand {
            display: flex;
            flex-direction: column;
            min-width: 0;
            height: 34px;
        }

        .mobile-collapsed-brand .mobile-collapsed-subtitle {
            font-family: "MainItalic", monospace;
            font-size: 10px;
            line-height: 1.2;
            color: var(--subtle);
        }

        .mobile-collapsed-brand .mobile-collapsed-title {
            font-family: "MainBoldItalic", monospace;
            display: block;
            height: 34px;
            font-size: 32px !important;
            line-height: 34px !important;
            text-transform: lowercase !important;
            background-image: linear-gradient(0deg, #977eb6, #86d3cf);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            white-space: nowrap;
        }

        #sidebar {
            width: 100%;
            min-width: 0;
            max-width: none;
            height: auto;
            min-height: 0;
            border-right: 0;
            border-bottom: 1px solid var(--border);
            overflow: visible;
            padding-bottom: 12px;
        }

        #header {
            position: relative;
            padding: 14px 14px 12px 14px;
        }

        #hide-sidebar {
            position: absolute;
            top: 50%;
            right: 14px;
            float: none;
            transform: translateY(-50%);
            font-size: 15px;
            padding: 0;
        }

        #subtitle {
            display: inline-block;
            margin-bottom: 2px;
            font-size: 10px;
            line-height: 1.2;
        }

        .mobile-nav-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 6px;
            padding: 10px 14px 0 14px;
        }

        body.mobile-template .mobile-nav-grid a.mobile-nav-link {
            min-width: 0;
            display: block;
            text-decoration: none;
        }

        body.mobile-template .mobile-nav-grid a.mobile-nav-link > #tab.mobile-nav-button {
            height: 100%;
            min-height: 34px;
            border: 1px solid var(--border) !important;
            border-radius: 0px !important;
            padding: 7px 8px !important;
            text-align: center;
            background: #000000 !important;
            font-size: 13px;
            line-height: 1.1;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        body.mobile-template .mobile-nav-grid a.mobile-nav-link > #tab.mobile-nav-button:hover {
            background-color: #000000 !important;
        }

        body.mobile-template .mobile-nav-grid a.mobile-nav-link > #tab.mobile-nav-button.active {
            background-color: var(--subtle) !important;
            color: var(--bg) !important;
            border-color: var(--subtle) !important;
            box-shadow: none;
        }

        #user-greeting {
            padding: 10px 14px 0 14px;
            font-size: 11px;
        }

        #sidebar-spacer {
            display: none;
        }

        #mini-player-tracks,
        #mini-player,
        #sidebar-footer {
            margin: 10px 14px 0 14px;
            width: auto;
            border: 1px solid var(--border);
            border-radius: 0px !important;
            background: rgba(8, 8, 8, 0.82);
        }

        #mini-player-tracks,
        #mini-player {
            max-height: none;
            overflow: hidden;
        }

        #mini-player {
            padding: 10px;
        }

        #mini-player-main {
            align-items: flex-start;
            gap: 6px;
        }

        body.mobile-template #header + #mini-player-tracks,
        body.mobile-template #header + #mini-player-tracks + #mini-player,
        body.mobile-template #header + #mini-player {
            margin-top: 0;
        }

        #mini-player-controls {
            min-width: 24px;
            padding-top: 1px;
        }

        #mini-player-volume-wrapper:hover #mini-player-volume,
        #mini-player-volume {
            width: 56px;
            opacity: 1;
        }

        #sidebar-footer {
            padding: 10px;
        }

        #container {
            display: block;
            width: 100%;
            height: auto;
            overflow: visible;
        }

        #content {
            max-width: none;
            width: 100%;
            height: auto;
            padding: 14px;
            box-sizing: border-box;
        }

        #content-layout {
            min-height: 0;
            gap: 14px;
        }

        #content-main {
            width: 100%;
            min-width: 0;
            padding: 0; 
            border: 0px solid var(--border);
            border-radius: 0px;
            background: #000;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        #content-main > *:first-child {
            margin-top: 0;
        }

        #content-main > *:last-child {
            margin-bottom: 0;
        }

        #content-footer {
            margin-top: 0;
            padding: 0 2px 2px 2px;
        }

        #footer-text {
            font-size: 11px;
            margin-bottom: 8px;
        }

        #content-footer-views {
            font-size: 11px;
        }

        body.mobile-template #content-main #homepage-hero-ascii {
            display: none;
        }

        body.mobile-template #content-main #ascii-time {
            font-size: 10px !important;
            line-height: 1.05;
        }

        body.mobile-template #content-main #ascii-time-label {
            font-size: 10px !important;
        }

        #content.content-scrolls #content-footer {
            margin-top: 0;
            margin-bottom: 0;
        }

        pre,
        code,
        table,
        img,
        iframe,
        video {
            max-width: 100%;
        }

        #content-main pre {
            overflow-x: auto;
        }

        body.mobile-template #content-main #ascii,
        body.mobile-template #content-main #ascii-time,
        body.mobile-template #content-main .usage-ascii {
            overflow-x: hidden !important;
            overflow-y: hidden !important;
        }

        @media (max-width: 420px) {
            .mobile-nav-grid {
                grid-template-columns: 1fr;
            }

            #content {
                padding: 10px;
            }

            #content-main {
                padding: 12px 11px;
                border-radius: 0px;
            }
        }
    </style>
</head>
<body class="mobile-template">

<div class="mobile-collapsed-header" id="mobile-collapsed-header" style="display:none">
    <span id="show-sidebar" data-tooltip="show menu" style="display:none"><i class="fa-solid fa-bars"></i></span>
    <span class="mobile-collapsed-brand">
        <span class="mobile-collapsed-title">fridge<span style="font-family: 'IBM_VGA'; font-size: 14px">.dev</span></span>
    </span>
</div>

<div id="page-wrapper">

<div id="sidebar">

    <div id="header">
        <span id="title">fridge</span>
        <span id="hide-sidebar" data-tooltip="hide menu"><i class="fa-solid fa-xmark"></i></span>
        <br><span id="maintenance-banner" style="color: #c88420; display: none;"><i class="fa-solid fa-hand"></i> <b>maintenance mode</b></span>
    </div>

    <div id="mini-player-tracks"></div>

    <div id="mini-player" class="mini-inactive">
        <div id="mini-player-main">
            <div id="mini-player-art-wrapper">
                <img id="mini-player-art" src=""/>
                <span id="mini-player-download" data-tooltip="download track"><i class="fa-solid fa-download"></i></span>
            </div>
            <div id="mini-player-meta">
                <div id="mini-player-title"><span id="mini-player-title-inner">now playing: nothing</span></div>
                <div id="mini-player-row">
                    <span id="mini-player-play" data-tooltip="play / pause"><i class="fa-solid fa-play"></i></span>
                    <input id="mini-player-seek" type="range" min="0" max="0" value="0" step="0.1">
                </div>
            </div>
            <div id="mini-player-controls">
                <span id="mini-player-volume-wrapper">
                    <span id="mini-player-mute" data-tooltip="mute / unmute"><i class="fa-solid fa-volume-high"></i></span>
                    <input id="mini-player-volume" type="range" min="0" max="1" step="0.01" value="1">
                </span>
            </div>
        </div>
        <audio id="mini-player-audio" preload="none"></audio>
    </div>

    <div class="mobile-nav-grid">
        <a class="mobile-nav-link" href="/feed"><div id="tab" class="mobile-nav-button" data-tooltip="short snippets and updates">feed</div></a>
        <a class="mobile-nav-link" href="/journal"><div id="tab" class="mobile-nav-button" data-tooltip="long-form updates and blog posts">journal</div></a>
        <a class="mobile-nav-link" href="/contact"><div id="tab" class="mobile-nav-button" data-tooltip="send a contact message">contact</div></a>
        <a class="mobile-nav-link" href="/guestbook"><div id="tab" class="mobile-nav-button" data-tooltip="leave a message about the website">guestbook</div></a>
        <a class="mobile-nav-link" href="/music"><div id="tab" class="mobile-nav-button" data-tooltip="listen to my music">music</div></a>
        <a class="mobile-nav-link" href="/gallery"><div id="tab" class="mobile-nav-button" data-tooltip="a listing of all images uploaded to the site">gallery</div></a>
        <a class="mobile-nav-link" href="/merch"><div id="tab" class="mobile-nav-button" data-tooltip="buy some of my merch">merch</div></a>
        <a class="mobile-nav-link" href="/bookmarks"><div id="tab" class="mobile-nav-button" data-tooltip="all the stuff you've saved">saves</div></a>
        <a class="mobile-nav-link" href="/tools"><div id="tab" class="mobile-nav-button" data-tooltip="web tools and utilities">tools</div></a>
        <a class="mobile-nav-link" href="/others"><div id="tab" class="mobile-nav-button" data-tooltip="content that doesn't fit elsewhere">others</div></a>
    </div>

    {user_greeting}
    <div id="sidebar-spacer"></div>

    <div id="sidebar-footer">
        <span id="footer-text">© <span id="footer-year"></span> fridge.dev</span>
        <script>document.getElementById('footer-year').textContent = new Date().getFullYear();</script>
        <div id="footer-buttons">
            <a class="mobile-footer-link" href="/"><div id="footer-button" class="mobile-footer-button" data-tooltip="go to homepage"><i class="fa-solid fa-home"></i></div></a>
            <a class="mobile-footer-link" href="/discord"><div id="footer-button" class="mobile-footer-button" data-tooltip="join the community discord"><i class="fa-brands fa-discord"></i></div></a>
            <a class="mobile-footer-link" href="/account"><div id="footer-button" class="mobile-footer-button" data-tooltip="access your fridge.dev account"><i class="fa-solid fa-user"></i></div></a>
            <a class="mobile-footer-link" href="/settings"><div id="footer-button" class="mobile-footer-button" data-tooltip="user settings"><i class="fa-solid fa-wrench"></i></div></a>
        </div>
    </div>

</div>

<div id="container">
<div id="content">
<div id="content-layout">
<noscript>
    <span id="error">
    error - javascript disabled<br>
    javascript is required for this site to function properly.<br>
    <ul>
        <li>make sure javascript is enabled in your browser settings</li>
        <li>use a web browser that supports javascript</li>
        <li>make sure your content blocker isn't blocking <u>https://fridge.dev/main.js</u> or <u>https://fridge.dev/js/</u></li>
    </ul>
    once you've fixed the issue, refresh the page and things should work properly.<br><br><br>
    </span>
</noscript>
<div id="content-main">
{content}
</div>
<div id="content-footer">
    <span id="content-footer-views" data-tooltip="Counting unique user views per page, since 02/03/2026">...</span>
</div>
</div>
</div>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script defer src="/main.js?v=mobile-20260408-3"></script>
<script defer src="/js/settings.js?v=mobile-20260714-1"></script>
<script defer src="/js/sidebar-player.js?v=mobile-20260408-3"></script>
<script defer src="/js/bookmarks.js?v=mobile-20260408-3"></script>
<script defer src="/js/bbcode.js?v=mobile-20260408-3"></script>
</div>
</div>
</body>
</html>
