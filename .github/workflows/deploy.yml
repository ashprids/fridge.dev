name: deploy to fridge.dev

on:
  workflow_run:
    workflows: [ "code lint" ]
    types: [ completed ]

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    env:
      REMOTE: deploy@45.76.134.105
      TARGET: /var/www/fridge.dev

    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # build step goes here if/when applicable

      - name: install rsync + ssh
        run: sudo apt-get update && sudo apt-get install -y rsync openssh-client

      - name: set up ssh
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 45.76.134.105 >> ~/.ssh/known_hosts

      - name: verify remote deploy target
        run: |
          set -euo pipefail

          ssh "$REMOTE" TARGET="$TARGET" bash -s <<'EOF'
          set -euo pipefail

          [ "$TARGET" = "/var/www/fridge.dev" ] || { echo "refusing to deploy to unexpected target: $TARGET" >&2; exit 1; }
          [ -d "$TARGET" ] || { echo "deploy target does not exist: $TARGET" >&2; exit 1; }
          [ -w "$TARGET" ] || { echo "deploy target is not writable by deploy user: $TARGET" >&2; exit 1; }
          EOF

      - name: deploy with rsync
        env:
          DEPLOY_DIR: .
        run: |
          set -euo pipefail

          rsync -az --delete \
            --filter='merge .rsyncignore' \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "README.md" \
            --exclude "LICENSE" \
            --exclude ".gitignore" \
            "$DEPLOY_DIR"/ "$REMOTE":"$TARGET"/

      - name: restart toast bot
        run: |
          ssh "$REMOTE" TARGET="$TARGET" bash -s <<'EOF'
          set -euo pipefail

          SCREEN_SESSION="toast"
          RUNTIME_USER="http"
          BOT_DIR="$TARGET/others/toast-discord-bot/bot"
          START_SCRIPT="$BOT_DIR/start.sh"
          LOG_FILE="$BOT_DIR/toast-bot.log"
          SCREEN_DIR="/tmp/toast-screen-$RUNTIME_USER"

          if ! sudo -n -u "$RUNTIME_USER" true; then
            echo "deploy must have passwordless sudo permission to run Toast as $RUNTIME_USER."
            exit 1
          fi

          if screen -list | grep -q "\.${SCREEN_SESSION}[[:space:]]"; then
            echo "Stopping deploy-owned Toast bot screen session '$SCREEN_SESSION'..."
            screen -S "$SCREEN_SESSION" -X stuff $'\003'

            for _ in $(seq 1 30); do
              if ! screen -list | grep -q "\.${SCREEN_SESSION}[[:space:]]"; then
                break
              fi
              sleep 1
            done

            if screen -list | grep -q "\.${SCREEN_SESSION}[[:space:]]"; then
              echo "Toast bot did not stop within 30 seconds; refusing to force-kill it."
              exit 1
            fi
          else
            echo "Deploy-owned Toast bot screen session '$SCREEN_SESSION' is not running."
          fi

          echo "Preparing screen socket directory for $RUNTIME_USER..."
          sudo -n -u "$RUNTIME_USER" mkdir -p "$SCREEN_DIR"
          sudo -n -u "$RUNTIME_USER" chmod 700 "$SCREEN_DIR"

          if sudo -n -u "$RUNTIME_USER" env SCREENDIR="$SCREEN_DIR" screen -list | grep -q "\.${SCREEN_SESSION}[[:space:]]"; then
            echo "Stopping $RUNTIME_USER-owned Toast bot screen session '$SCREEN_SESSION'..."
            sudo -n -u "$RUNTIME_USER" env SCREENDIR="$SCREEN_DIR" screen -S "$SCREEN_SESSION" -X stuff $'\003'

            for _ in $(seq 1 30); do
              if ! sudo -n -u "$RUNTIME_USER" env SCREENDIR="$SCREEN_DIR" screen -list | grep -q "\.${SCREEN_SESSION}[[:space:]]"; then
                break
              fi
              sleep 1
            done

            if sudo -n -u "$RUNTIME_USER" env SCREENDIR="$SCREEN_DIR" screen -list | grep -q "\.${SCREEN_SESSION}[[:space:]]"; then
              echo "Toast bot did not stop within 30 seconds; refusing to force-kill it."
              exit 1
            fi
          else
            echo "$RUNTIME_USER-owned Toast bot screen session '$SCREEN_SESSION' is not running."
          fi

          echo "Preparing Toast bot log for $RUNTIME_USER..."
          touch "$LOG_FILE"
          chgrp "$RUNTIME_USER" "$LOG_FILE"
          chmod 664 "$LOG_FILE"

          echo "Starting Toast bot as $RUNTIME_USER with $START_SCRIPT..."
          sudo -n -u "$RUNTIME_USER" env SCREENDIR="$SCREEN_DIR" bash "$START_SCRIPT"
          EOF
