name: deploy to fridge.dev

on:
  workflow_run:
    workflows: [ "code lint" ]
    types: [ completed ]

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    env:
      REMOTE: deploy@45.76.134.105
      TARGET: /var/www/fridge.dev

    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      # build step goes here if/when applicable

      - name: install rsync + ssh
        run: sudo apt-get update && sudo apt-get install -y rsync openssh-client

      - name: set up ssh
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 45.76.134.105 >> ~/.ssh/known_hosts

      - name: verify remote deploy target
        run: |
          set -euo pipefail

          ssh "$REMOTE" TARGET="$TARGET" bash -s <<'EOF'
          set -euo pipefail

          [ "$TARGET" = "/var/www/fridge.dev" ] || { echo "refusing to deploy to unexpected target: $TARGET" >&2; exit 1; }
          [ -d "$TARGET" ] || { echo "deploy target does not exist: $TARGET" >&2; exit 1; }
          [ -w "$TARGET" ] || { echo "deploy target is not writable by deploy user: $TARGET" >&2; exit 1; }
          EOF

      - name: deploy with rsync
        env:
          DEPLOY_DIR: .
        run: |
          set -euo pipefail

          rsync -az --delete \
            --filter='merge .rsyncignore' \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "README.md" \
            --exclude "LICENSE" \
            --exclude ".gitignore" \
            "$DEPLOY_DIR"/ "$REMOTE":"$TARGET"/

      - name: restart toast bot
        run: |
          ssh "$REMOTE" TARGET="$TARGET" bash -s <<'EOF'
          set -euo pipefail

          SCREEN_SESSION="toast"
          RUNTIME_USER="http"
          BOT_DIR="$TARGET/others/toast-discord-bot/bot"
          START_SCRIPT="$BOT_DIR/start.sh"
          LOG_FILE="$BOT_DIR/toast-bot.log"
          SCREEN_DIR="/tmp/toast-screen-$RUNTIME_USER"

          if ! sudo -n -u "$RUNTIME_USER" true; then
            echo "deploy must have passwordless sudo permission to run Toast as $RUNTIME_USER."
            exit 1
          fi

          if screen -list | grep -q "\.${SCREEN_SESSION}[[:space:]]"; then
            echo "Stopping deploy-owned Toast bot screen session '$SCREEN_SESSION'..."
            screen -S "$SCREEN_SESSION" -X stuff $'\003'

            for _ in $(seq 1 30); do
              if ! screen -list | grep -q "\.${SCREEN_SESSION}[[:space:]]"; then
                break
              fi
              sleep 1
            done

            if screen -list | grep -q "\.${SCREEN_SESSION}[[:space:]]"; then
              echo "Toast bot did not stop within 30 seconds; refusing to force-kill it."
              exit 1
            fi
          else
            echo "Deploy-owned Toast bot screen session '$SCREEN_SESSION' is not running."
          fi

          echo "Preparing screen socket directory for $RUNTIME_USER..."
          sudo -n -u "$RUNTIME_USER" mkdir -p "$SCREEN_DIR"
          sudo -n -u "$RUNTIME_USER" chmod 700 "$SCREEN_DIR"

          if sudo -n -u "$RUNTIME_USER" env SCREENDIR="$SCREEN_DIR" screen -list | grep -q "\.${SCREEN_SESSION}[[:space:]]"; then
            echo "Stopping $RUNTIME_USER-owned Toast bot screen session '$SCREEN_SESSION'..."
            sudo -n -u "$RUNTIME_USER" env SCREENDIR="$SCREEN_DIR" screen -S "$SCREEN_SESSION" -X stuff $'\003'

            for _ in $(seq 1 30); do
              if ! sudo -n -u "$RUNTIME_USER" env SCREENDIR="$SCREEN_DIR" screen -list | grep -q "\.${SCREEN_SESSION}[[:space:]]"; then
                break
              fi
              sleep 1
            done

            if sudo -n -u "$RUNTIME_USER" env SCREENDIR="$SCREEN_DIR" screen -list | grep -q "\.${SCREEN_SESSION}[[:space:]]"; then
              echo "Toast bot did not stop within 30 seconds; refusing to force-kill it."
              exit 1
            fi
          else
            echo "$RUNTIME_USER-owned Toast bot screen session '$SCREEN_SESSION' is not running."
          fi

          echo "Preparing Toast bot log for $RUNTIME_USER..."
          touch "$LOG_FILE"
          chgrp "$RUNTIME_USER" "$LOG_FILE"
          chmod 664 "$LOG_FILE"

          echo "Starting Toast bot as $RUNTIME_USER with $START_SCRIPT..."
          sudo -n -u "$RUNTIME_USER" env SCREENDIR="$SCREEN_DIR" bash "$START_SCRIPT"
          EOF

      - name: send patch notice
        env:
          EVENT_PATH: ${{ github.event_path }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO_URL: ${{ github.event.repository.html_url }}
          BRANCH_NAME: ${{ github.event.workflow_run.head_branch }}
          REMOTE: deploy@45.76.134.105
        run: |
          set -euo pipefail

          python3 - "$EVENT_PATH" "$HEAD_SHA" "$REPO_URL" "$BRANCH_NAME" > /tmp/toast-patch-notice.json <<'PY'
          import json
          import pathlib
          import re
          import subprocess
          import sys

          event_path, head_sha, repo_url, branch_name = sys.argv[1:5]
          event = json.loads(pathlib.Path(event_path).read_text())
          workflow_run = event.get('workflow_run', {})
          pull_requests = workflow_run.get('pull_requests') or []
          first_pr = pull_requests[0] if pull_requests and isinstance(pull_requests[0], dict) else {}

          commit_subject = subprocess.check_output(
              ['git', 'show', '-s', '--format=%s', head_sha],
              text=True,
          ).strip()

          pr_number = first_pr.get('number')
          pr_url = str(first_pr.get('html_url') or '').strip()
          if not pr_url:
              match = re.search(r'Merge pull request #(\d+)', commit_subject)
              if match:
                  pr_number = int(match.group(1))
                  pr_url = f'{repo_url}/pull/{match.group(1)}'

          parents = subprocess.check_output(
              ['git', 'show', '-s', '--format=%P', head_sha],
              text=True,
          ).strip().split()
          base_sha = parents[0] if parents else ''

          if base_sha:
              log_range = f'{base_sha}..{head_sha}'
              raw_commits = subprocess.check_output(
                  ['git', 'log', '--no-merges', '--format=%H%x1f%s%x1f%b%x1e', log_range],
                  text=True,
              )
          else:
              raw_commits = subprocess.check_output(
                  ['git', 'show', '--no-patch', '--format=%H%x1f%s%x1f%b%x1e', head_sha],
                  text=True,
              )

          commits = []
          for record in raw_commits.split('\x1e'):
              record = record.strip()
              if not record:
                  continue
              sha, subject, body = (record.split('\x1f') + ['', ''])[:3]
              subject = ' '.join(subject.split())
              body_lines = [line.strip() for line in body.splitlines() if line.strip()]
              commits.append({
                  'sha': sha.strip(),
                  'subject': subject,
                  'body': '\n'.join(body_lines[:2]),
                  'url': f'{repo_url}/commit/{sha.strip()}',
              })

          payload = {
              'channel_id': '1455194403642802309',
              'branch': branch_name or 'main',
              'commit_sha': head_sha,
              'commit_url': f'{repo_url}/commit/{head_sha}',
              'commits': commits,
              'pr_number': pr_number or '',
              'pr_url': pr_url,
          }
          print(json.dumps(payload))
          PY

          for attempt in 1 2 3 4 5; do
            if ssh "$REMOTE" 'curl -fsS -X POST -H "Content-Type: application/json" --data @- http://127.0.0.1:8765/patch-notice' < /tmp/toast-patch-notice.json; then
              break
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "warning: toast patch notice could not be delivered after 5 attempts" >&2
              exit 0
            fi

            sleep 2
          done
