<style>
    body:has(#wiki-layout) #sidebar,
    body:has(#wiki-layout) #show-sidebar {
        display: none !important;
    }

    body:has(#wiki-layout) #page-wrapper {
        display: block;
    }

    body:has(#wiki-layout) #container {
        width: 100vw;
        height: 100dvh;
        overflow-y: auto;
    }

    body:has(#wiki-layout) #content {
        max-width: none;
        width: 100%;
        min-height: 100%;
        padding: 0;
    }

    body:has(#wiki-layout) #content-layout,
    body:has(#wiki-layout) #content-main {
        min-height: 100dvh;
    }

    body:has(#wiki-layout) #content-footer {
        display: none;
    }

    #wiki-layout {
        display: grid;
        grid-template-columns: minmax(220px, 260px) minmax(0, 1fr);
        gap: 0;
        align-items: start;
        min-height: 100dvh;
    }

    #wiki-sidebar {
        border-right: 1px solid var(--border);
        padding: 26px 18px;
        position: sticky;
        top: 0;
        height: 100dvh;
        min-height: 0;
        overflow-y: auto;
        box-sizing: border-box;
        background: rgba(10, 10, 10, 0.82);
    }

    #wiki-sidebar h2,
    #wiki-content h1,
    #wiki-content h2,
    #wiki-content h3,
    #wiki-content h4 {
        margin-top: 0;
    }

    #wiki-page-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .wiki-page-link {
        display: block;
        padding: 8px 10px;
        border: 1px solid var(--border);
        text-decoration: none;
        color: var(--fg);
    }

    .wiki-page-link:hover,
    .wiki-page-link.active {
        background: var(--subtle);
        color: var(--bg);
        border-color: var(--subtle);
    }

    #wiki-content {
        min-width: 0;
        padding: 26px;
    }

    #wiki-meta {
        display: inline-block;
        margin-bottom: 16px;
        color: #888;
    }

    #wiki-rendered {
        line-height: 1.7;
    }

    #wiki-rendered h1,
    #wiki-rendered h2,
    #wiki-rendered h3,
    #wiki-rendered h4,
    #wiki-rendered h5,
    #wiki-rendered h6 {
        margin-top: 28px;
        margin-bottom: 10px;
    }

    #wiki-rendered p,
    #wiki-rendered ul,
    #wiki-rendered ol,
    #wiki-rendered pre,
    #wiki-rendered blockquote,
    #wiki-rendered .wiki-image-placeholder,
    #wiki-rendered .wiki-image {
        margin: 0 0 16px 0;
    }

    #wiki-rendered ul,
    #wiki-rendered ol {
        padding-left: 22px;
    }

    #wiki-rendered li {
        margin-bottom: 8px;
    }

    #wiki-rendered code {
        font-family: 'MainRegular', monospace;
        background: rgba(255, 255, 255, 0.08);
        padding: 1px 5px;
    }

    #wiki-rendered pre {
        overflow-x: auto;
        border: 1px solid var(--border);
        padding: 12px;
        background: rgba(0, 0, 0, 0.45);
    }

    #wiki-rendered pre code {
        background: transparent;
        padding: 0;
    }

    #wiki-rendered blockquote {
        border-left: 3px solid var(--border);
        padding-left: 14px;
        color: #c4c4c4;
    }

    #wiki-rendered hr {
        border: 0;
        border-top: 1px solid var(--border);
        margin: 24px 0;
    }

    .wiki-image {
        display: block;
        max-width: 100%;
        border: 1px solid var(--border);
        background: #050505;
    }

    .wiki-image-placeholder {
        display: grid;
        gap: 8px;
        min-height: 180px;
        place-content: center;
        padding: 24px;
        border: 1px dashed var(--border);
        background: rgba(255, 255, 255, 0.04);
        color: #aaa;
        text-align: center;
    }

    .wiki-image-placeholder span {
        color: var(--fg);
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.04em;
    }

    .wiki-image-placeholder small {
        max-width: 68ch;
        line-height: 1.5;
    }

    @media (max-width: 800px) {
        body:has(#wiki-layout) #content {
            padding: 0;
        }

        #wiki-layout {
            grid-template-columns: 1fr;
        }

        #wiki-sidebar {
            position: static;
            height: auto;
            overflow-y: visible;
            min-height: 0;
            border-right: 0;
            border-bottom: 1px solid var(--border);
            padding: 18px 14px;
        }

        #wiki-content {
            padding: 18px 14px;
        }
    }
</style>

<div id="wiki-layout">
    <aside id="wiki-sidebar">
        <h2><span id="title">fridge.dev</span> frdgBeats Wiki</h2>
        <ul id="wiki-page-list">
            {wiki_page_list}
        </ul>
    </aside>

    <section id="wiki-content">
        <h1>{wiki_page_title}</h1>
        <span id="wiki-meta">{wiki_page_name}</span>
        <div id="wiki-rendered">
            {wiki_page_content}
        </div>
    </section>
</div>

<script>
document.querySelectorAll('#wiki-rendered pre code').forEach(function(block) {
    if (window.hljs) {
        window.hljs.highlightElement(block);
    }
});
</script>
