<style>
    .upload-app {
        display: grid;
        gap: 1.25rem;
        max-width: 920px;
    }

    .upload-panel,
    .upload-status,
    .upload-transfer {
        display: grid;
        gap: .8rem;
    }

    .upload-role-row,
    .upload-link-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
    }

    .upload-role-row.radio-group {
        margin-block: .35rem .75rem;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        width: 100%;
        max-width: 34rem;
        justify-self: center;
    }

    .upload-role-row .radio-label {
        justify-content: center;
        min-width: 0;
        min-height: 32px;
        padding: 8px 12px;
        border: 1px solid var(--border);
        box-sizing: border-box;
    }

    .upload-role-row .radio-label:has(.radio:checked) {
        border-color: var(--links);
        background-color: rgba(255, 255, 255, 0.06);
    }

    .upload-file-picker {
        width: min(100%, 18rem) !important;
        margin-left: auto;
        margin-right: auto;
        text-align: center;
    }

    .upload-file-picker span {
        overflow-wrap: anywhere;
    }

    .upload-file-picker:focus-within {
        border-color: var(--links);
    }

    .upload-file-input {
        position: absolute;
        inline-size: 1px;
        block-size: 1px;
        opacity: 0;
        pointer-events: none;
    }

    .upload-link-row input {
        flex: 1 1 20rem;
        min-width: min(100%, 22rem);
        max-width: 100%;
    }

    .upload-link-row #two-buttons {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
        width: auto;
        height: 32px;
        padding: 0 12px;
        margin: 0;
    }

    .upload-app #form-button {
        width: min(100%, 18rem);
        margin-left: auto;
        margin-right: auto;
    }

    .upload-meter {
        inline-size: 100%;
        block-size: 12px;
        border: 1px solid var(--border);
        border-radius: 0;
        accent-color: var(--links);
        background: color-mix(in srgb, var(--bg) 88%, var(--fg) 12%);
        overflow: hidden;
    }

    .upload-meter::-webkit-progress-bar {
        border-radius: 0;
        background: color-mix(in srgb, var(--bg) 88%, var(--fg) 12%);
    }

    .upload-meter::-webkit-progress-value {
        border-radius: 0;
        background: var(--links);
    }

    .upload-meter::-moz-progress-bar {
        border-radius: 0;
        background: var(--links);
    }

    .upload-progress-label {
        display: flex;
        flex-wrap: wrap;
        gap: .5rem;
        align-items: baseline;
    }

    .upload-log {
        display: none;
        min-height: 7rem;
        max-height: 14rem;
        overflow: auto;
        margin: 0;
        padding: .75rem;
        border: 1px solid var(--border);
        border-radius: 4px;
        white-space: pre-wrap;
        background: var(--bg);
    }

    .upload-status-line {
        min-height: 1.5rem;
        margin-bottom: 0;
    }

    .upload-muted {
        color: var(--subtle);
    }

    .upload-hidden {
        display: none !important;
    }

    [data-create-panel],
    [data-sender-panel] {
        justify-items: center;
    }

    [data-create-panel] p,
    [data-sender-panel] p {
        justify-self: stretch;
    }

    @media (max-width: 520px) {
        .upload-role-row {
            grid-template-columns: 1fr;
        }
    }
</style>

<h1>serverless upload</h1>
<h2>encrypted peer-to-peer file transfer</h2>

<div class="upload-app" data-upload-app>
    <section class="upload-panel" data-create-panel>

        <div class="upload-role-row radio-group" role="radiogroup" aria-label="transfer role">
            <label class="radio-label"><input class="radio" type="radio" name="upload-role" value="sender" checked><span>i am sending</span></label>
            <label class="radio-label"><input class="radio" type="radio" name="upload-role" value="receiver"><span>i am receiving</span></label>
        </div>

        <button id="form-button" type="button" data-create-room>create link</button>
    </section>

    <section class="upload-status upload-hidden" data-room-panel>
        <p><strong data-role-label>waiting</strong></p>
        <p class="upload-status-line" data-status-line>ready.</p>

        <div class="upload-link-row" data-link-row>
            <input class="text-input" type="text" data-room-url readonly aria-label="transfer link">
            <button id="two-buttons" type="button" data-copy-link>copy link</button>
        </div>
    </section>
    <br><br>
    <section class="upload-transfer upload-hidden" data-sender-panel>
        <label id="two-buttons" class="upload-file-picker">
            <span data-file-label>choose file</span>
            <input class="upload-file-input" type="file" data-file-input>
        </label>
        <button id="form-button" class="form-button-disabled" type="button" data-send-file disabled>send file</button>
    </section>

    <section class="upload-transfer upload-hidden" data-receiver-panel></section>

    <section class="upload-status upload-hidden" data-progress-panel>
        <progress class="upload-meter" value="0" max="100" data-progress></progress>
        <p class="upload-progress-label"><strong data-progress-label>0%</strong> <span class="upload-muted" data-progress-detail></span></p>
    </section>

    <pre class="upload-log" data-log aria-live="polite">ready.</pre>
</div>

<script>
(() => {
    const MAX_FILE_SIZE = 100 * 1024 * 1024 * 1024;
    const CHUNK_SIZE = 48 * 1024;
    const ICE_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }];

    const app = document.querySelector('[data-upload-app]');
    if (!app || !window.crypto?.subtle || !window.RTCPeerConnection) {
        const logEl = app?.querySelector('[data-log]');
        const createPanel = app?.querySelector('[data-create-panel]');
        if (logEl) {
            logEl.textContent = 'this browser does not support encrypted peer-to-peer transfers.';
        }
        if (createPanel) {
            createPanel.innerHTML = '<p><strong>this browser does not support encrypted peer-to-peer transfers.</strong></p>';
        }
        return;
    }

    const els = {
        createPanel: app.querySelector('[data-create-panel]'),
        roomPanel: app.querySelector('[data-room-panel]'),
        senderPanel: app.querySelector('[data-sender-panel]'),
        receiverPanel: app.querySelector('[data-receiver-panel]'),
        progressPanel: app.querySelector('[data-progress-panel]'),
        createRoom: app.querySelector('[data-create-room]'),
        copyLink: app.querySelector('[data-copy-link]'),
        linkRow: app.querySelector('[data-link-row]'),
        roomUrl: app.querySelector('[data-room-url]'),
        roleLabel: app.querySelector('[data-role-label]'),
        roomCopy: app.querySelector('[data-room-copy]'),
        statusLine: app.querySelector('[data-status-line]'),
        fileInput: app.querySelector('[data-file-input]'),
        fileLabel: app.querySelector('[data-file-label]'),
        sendFile: app.querySelector('[data-send-file]'),
        receiverCopy: app.querySelector('[data-receiver-copy]'),
        progress: app.querySelector('[data-progress]'),
        progressLabel: app.querySelector('[data-progress-label]'),
        progressDetail: app.querySelector('[data-progress-detail]'),
        log: app.querySelector('[data-log]'),
    };

    const state = {
        token: new URLSearchParams(location.search).get('r') || '',
        room: null,
        side: null,
        role: null,
        remoteSide: null,
        keyPair: null,
        publicKey: '',
        sharedKey: null,
        pc: null,
        dc: null,
        pendingIce: [],
        lastSignalId: 0,
        polling: null,
        heartbeat: null,
        ended: false,
        processedSignals: new Set(),
        startedOffer: false,
        selectedFile: null,
        outgoingFile: null,
        receiving: null,
        receiveQueue: Promise.resolve(),
    };

    function show(el, visible = true) {
        el?.classList.toggle('upload-hidden', !visible);
    }

    function log(message) {
        const stamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        els.log.textContent += `\n[${stamp}] ${message}`;
        els.log.scrollTop = els.log.scrollHeight;
    }

    function setStatus(message) {
        if (els.statusLine) {
            els.statusLine.textContent = message;
        }
    }

    function setProgress(done, total, detail = '', waitForAck = false) {
        let pct = total > 0 ? Math.min(100, (done / total) * 100) : 0;
        if (waitForAck && pct >= 100) {
            pct = 99.9;
        }
        show(els.progressPanel, true);
        els.progress.value = pct;
        els.progressLabel.textContent = `${pct.toFixed(pct >= 10 ? 0 : 1)}%`;
        els.progressDetail.textContent = detail || `${formatBytes(done)} / ${formatBytes(total)}`;
    }

    function setSafeToClose(message = 'complete. safe to close this page.') {
        setProgress(1, 1, message);
        setStatus(message);
    }

    function endLocalSession(message = 'session ended.') {
        if (state.ended) return;
        state.ended = true;
        if (state.polling) {
            window.clearInterval(state.polling);
            state.polling = null;
        }
        if (state.heartbeat) {
            window.clearInterval(state.heartbeat);
            state.heartbeat = null;
        }
        try {
            state.dc?.close();
            state.pc?.close();
        } catch (error) {
            log(`close failed: ${error.message}`);
        }
        setStatus(message);
        show(els.linkRow, false);
        updateSendReadiness();
    }

    function handleApiError(error) {
        if (error.message === 'room_ended') {
            endLocalSession('peer left. session ended.');
            return true;
        }
        return false;
    }

    function formatBytes(bytes) {
        const units = ['B', 'KB', 'MB', 'GB'];
        let value = bytes;
        let unit = 0;
        while (value >= 1024 && unit < units.length - 1) {
            value /= 1024;
            unit++;
        }
        return `${value.toFixed(value >= 10 || unit === 0 ? 0 : 1)}${units[unit]}`;
    }

    function b64(buffer) {
        let binary = '';
        const bytes = new Uint8Array(buffer);
        for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
        return btoa(binary);
    }

    function unb64(value) {
        const binary = atob(value);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        return bytes.buffer;
    }

    function rotr(value, shift) {
        return (value >>> shift) | (value << (32 - shift));
    }

    class Sha256 {
        constructor() {
            this.h = [
                0x6a09e667, 0xbb67ae85, 0x3c6ef372, 0xa54ff53a,
                0x510e527f, 0x9b05688c, 0x1f83d9ab, 0x5be0cd19,
            ];
            this.buffer = new Uint8Array(64);
            this.bufferLength = 0;
            this.bytes = 0;
            this.w = new Uint32Array(64);
        }

        update(data) {
            const bytes = data instanceof Uint8Array ? data : new Uint8Array(data);
            this.bytes += bytes.length;
            let offset = 0;
            while (offset < bytes.length) {
                const take = Math.min(64 - this.bufferLength, bytes.length - offset);
                this.buffer.set(bytes.subarray(offset, offset + take), this.bufferLength);
                this.bufferLength += take;
                offset += take;
                if (this.bufferLength === 64) {
                    this.process(this.buffer);
                    this.bufferLength = 0;
                }
            }
            return this;
        }

        process(chunk) {
            const k = Sha256.k;
            const w = this.w;
            for (let i = 0; i < 16; i++) {
                const j = i * 4;
                w[i] = ((chunk[j] << 24) | (chunk[j + 1] << 16) | (chunk[j + 2] << 8) | chunk[j + 3]) >>> 0;
            }
            for (let i = 16; i < 64; i++) {
                const s0 = (rotr(w[i - 15], 7) ^ rotr(w[i - 15], 18) ^ (w[i - 15] >>> 3)) >>> 0;
                const s1 = (rotr(w[i - 2], 17) ^ rotr(w[i - 2], 19) ^ (w[i - 2] >>> 10)) >>> 0;
                w[i] = (w[i - 16] + s0 + w[i - 7] + s1) >>> 0;
            }

            let [a, b, c, d, e, f, g, h] = this.h;
            for (let i = 0; i < 64; i++) {
                const s1 = (rotr(e, 6) ^ rotr(e, 11) ^ rotr(e, 25)) >>> 0;
                const ch = ((e & f) ^ (~e & g)) >>> 0;
                const temp1 = (h + s1 + ch + k[i] + w[i]) >>> 0;
                const s0 = (rotr(a, 2) ^ rotr(a, 13) ^ rotr(a, 22)) >>> 0;
                const maj = ((a & b) ^ (a & c) ^ (b & c)) >>> 0;
                const temp2 = (s0 + maj) >>> 0;
                h = g;
                g = f;
                f = e;
                e = (d + temp1) >>> 0;
                d = c;
                c = b;
                b = a;
                a = (temp1 + temp2) >>> 0;
            }

            this.h[0] = (this.h[0] + a) >>> 0;
            this.h[1] = (this.h[1] + b) >>> 0;
            this.h[2] = (this.h[2] + c) >>> 0;
            this.h[3] = (this.h[3] + d) >>> 0;
            this.h[4] = (this.h[4] + e) >>> 0;
            this.h[5] = (this.h[5] + f) >>> 0;
            this.h[6] = (this.h[6] + g) >>> 0;
            this.h[7] = (this.h[7] + h) >>> 0;
        }

        hex() {
            const bitLength = this.bytes * 8;
            this.buffer[this.bufferLength++] = 0x80;
            if (this.bufferLength > 56) {
                this.buffer.fill(0, this.bufferLength, 64);
                this.process(this.buffer);
                this.bufferLength = 0;
            }
            this.buffer.fill(0, this.bufferLength, 56);
            const high = Math.floor(bitLength / 0x100000000);
            const low = bitLength >>> 0;
            this.buffer[56] = (high >>> 24) & 255;
            this.buffer[57] = (high >>> 16) & 255;
            this.buffer[58] = (high >>> 8) & 255;
            this.buffer[59] = high & 255;
            this.buffer[60] = (low >>> 24) & 255;
            this.buffer[61] = (low >>> 16) & 255;
            this.buffer[62] = (low >>> 8) & 255;
            this.buffer[63] = low & 255;
            this.process(this.buffer);
            return Array.from(this.h, value => value.toString(16).padStart(8, '0')).join('');
        }
    }

    Sha256.k = [
        0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
        0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
        0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
        0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
        0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
        0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
        0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
        0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2,
    ];

    async function api(action, options = {}) {
        const method = options.method || 'GET';
        const params = new URLSearchParams({ api: action });
        if (state.token) params.set('r', state.token);
        const request = { method, cache: 'no-store' };
        if (options.body) {
            request.body = options.body;
            request.headers = { 'Content-Type': 'application/x-www-form-urlencoded' };
        }
        const response = await fetch(`/tools/upload/?${params.toString()}`, request);
        const data = await response.json().catch(() => ({ ok: false, error: 'bad_json' }));
        if (!response.ok || !data.ok) {
            throw new Error(data.error || `http_${response.status}`);
        }
        return data;
    }

    async function createRoom() {
        const role = app.querySelector('input[name="upload-role"]:checked')?.value || 'sender';
        els.createRoom.disabled = true;
        const body = new URLSearchParams({ role });
        const data = await api('create', { method: 'POST', body });
        state.token = data.room.token;
        history.replaceState(null, '', data.url);
        await enterRoom(data.room);
        setStatus('link created. waiting for the other browser.');
        log('link created. send it to the other browser.');
    }

    async function loadRoom() {
        if (!state.token) return;
        const data = await api('room');
        await enterRoom(data.room);
    }

    async function enterRoom(room) {
        state.room = room;
        state.side = room.ownSide;
        state.role = room.creatorRole === 'sender'
            ? (state.side === 'creator' ? 'sender' : 'receiver')
            : (state.side === 'creator' ? 'receiver' : 'sender');
        state.remoteSide = state.side === 'creator' ? 'guest' : 'creator';

        show(els.createPanel, false);
        show(els.roomPanel, true);
        show(els.senderPanel, state.role === 'sender');
        show(els.receiverPanel, state.role === 'receiver');

        const absoluteUrl = `${location.origin}/tools/upload/?r=${encodeURIComponent(state.token)}`;
        els.roomUrl.value = absoluteUrl;
        els.roleLabel.textContent = state.role === 'sender' ? 'you are the sender' : 'you are the receiver';
        if (els.roomCopy) {
            els.roomCopy.textContent = room.guestJoined ? 'peer joined. negotiating connection.' : 'waiting for the other browser to open this link.';
        }
        show(els.linkRow, !room.guestJoined);
        setStatus(room.guestJoined ? 'peer joined. connecting...' : 'waiting for peer.');
        if (els.receiverCopy) {
            els.receiverCopy.textContent = window.showSaveFilePicker
                ? 'keep this tab open. your browser will ask where to stream the file when it arrives.'
                : 'keep this tab open. this browser will download after the file finishes.';
        }

        if (!state.keyPair) {
            await setupKeys();
            await publishKey();
        }
        await maybeDeriveSharedKey(room);
        setupPeerConnection();
        startPolling();
        startHeartbeat();
        updateSendReadiness();
    }

    async function setupKeys() {
        state.keyPair = await crypto.subtle.generateKey({ name: 'ECDH', namedCurve: 'P-256' }, false, ['deriveKey']);
        const rawPublic = await crypto.subtle.exportKey('raw', state.keyPair.publicKey);
        state.publicKey = b64(rawPublic);
    }

    async function publishKey() {
        const body = new URLSearchParams({ side: state.side, publicKey: state.publicKey });
        await api('key', { method: 'POST', body });
    }

    async function maybeDeriveSharedKey(room) {
        if (state.sharedKey || !room.publicKeys?.[state.remoteSide]) return;
        const remotePublic = await crypto.subtle.importKey(
            'raw',
            unb64(room.publicKeys[state.remoteSide]),
            { name: 'ECDH', namedCurve: 'P-256' },
            false,
            []
        );
        state.sharedKey = await crypto.subtle.deriveKey(
            { name: 'ECDH', public: remotePublic },
            state.keyPair.privateKey,
            { name: 'AES-GCM', length: 256 },
            false,
            ['encrypt', 'decrypt']
        );
        log('peer encryption key ready.');
    }

    function setupPeerConnection() {
        if (state.pc) return;

        state.pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
        state.pc.onicecandidate = event => {
            if (event.candidate) sendSignal('ice', event.candidate);
        };
        state.pc.onconnectionstatechange = () => {
            if (state.pc.connectionState === 'connected') {
                setStatus('connected. ready.');
            } else if (['failed', 'disconnected'].includes(state.pc.connectionState)) {
                setStatus(`connection ${state.pc.connectionState}.`);
            }
            log(`connection: ${state.pc.connectionState}`);
        };
        state.pc.ondatachannel = event => {
            bindDataChannel(event.channel);
        };

        if (state.role === 'sender') {
            bindDataChannel(state.pc.createDataChannel('file', { ordered: true }));
        }
    }

    function bindDataChannel(channel) {
        if (state.dc) return;
        state.dc = channel;
        state.dc.binaryType = 'arraybuffer';
        state.dc.bufferedAmountLowThreshold = 2 * 1024 * 1024;
        state.dc.onopen = () => {
            setStatus(state.role === 'sender' ? 'connected. choose a file to send.' : 'connected. waiting for file.');
            log('data channel open.');
            updateSendReadiness();
        };
        state.dc.onclose = () => {
            setStatus('connection closed.');
            log('data channel closed.');
            updateSendReadiness();
        };
        state.dc.onerror = () => log('data channel error.');
        state.dc.onmessage = queueReceivedMessage;
    }

    async function maybeCreateOffer() {
        if (state.startedOffer || state.role !== 'sender' || !state.room?.guestJoined || !state.sharedKey || !state.pc) {
            return;
        }
        state.startedOffer = true;
        const offer = await state.pc.createOffer();
        await state.pc.setLocalDescription(offer);
        await sendSignal('offer', offer);
        log('connection offer sent.');
    }

    async function sendSignal(type, payload) {
        const body = new URLSearchParams({
            side: state.side,
            type,
            payload: JSON.stringify(payload),
        });
        await api('signal', { method: 'POST', body });
    }

    function notifyServerSessionEnded() {
        if (!state.token || !state.side) return;
        const body = new URLSearchParams({ side: state.side });
        const url = `/tools/upload/?api=end&r=${encodeURIComponent(state.token)}`;
        const blob = new Blob([body.toString()], { type: 'application/x-www-form-urlencoded' });
        if (navigator.sendBeacon) {
            navigator.sendBeacon(url, blob);
            return;
        }
        fetch(url, {
            method: 'POST',
            body,
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            keepalive: true,
        }).catch(() => {});
    }

    async function startPolling() {
        if (state.polling) return;
        state.polling = window.setInterval(poll, 1200);
        await poll();
    }

    function startHeartbeat() {
        if (state.heartbeat) return;
        state.heartbeat = window.setInterval(() => {
            if (!state.token || !state.side || state.ended) return;
            const body = new URLSearchParams({ side: state.side });
            api('heartbeat', { method: 'POST', body }).catch(error => {
                if (!handleApiError(error)) {
                    log(`heartbeat failed: ${error.message}`);
                }
            });
        }, 5000);
    }

    async function poll() {
        if (!state.token || !state.side || state.ended) return;
        try {
            const params = new URLSearchParams({ api: 'signals', r: state.token, since: String(state.lastSignalId) });
            const response = await fetch(`/tools/upload/?${params.toString()}`, { cache: 'no-store' });
            const data = await response.json().catch(() => ({ ok: false, error: 'bad_json' }));
            if (!data.ok) {
                if (data.error === 'room_ended') {
                    endLocalSession('peer left. session ended.');
                    return;
                }
                throw new Error(data.error || 'poll_failed');
            }
            state.room = data.room;
            if (data.room.ended) {
                endLocalSession('peer left. session ended.');
                return;
            }
            await maybeDeriveSharedKey(data.room);
            if (els.roomCopy) {
                els.roomCopy.textContent = data.room.guestJoined ? 'peer joined. negotiating connection.' : 'waiting for the other browser to open this link.';
            }
            show(els.linkRow, !data.room.guestJoined);
            if (data.room.guestJoined && !state.dc) {
                setStatus('peer joined. connecting...');
            }
            for (const signal of data.signals || []) {
                state.lastSignalId = Math.max(state.lastSignalId, Number(signal.id) || 0);
                if (state.processedSignals.has(signal.id)) continue;
                state.processedSignals.add(signal.id);
                await handleSignal(signal);
            }
            await maybeCreateOffer();
            updateSendReadiness();
        } catch (error) {
            log(`poll failed: ${error.message}`);
        }
    }

    async function handleSignal(signal) {
        setupPeerConnection();
        const payload = JSON.parse(signal.payload);
        if (signal.type === 'offer') {
            await state.pc.setRemoteDescription(payload);
            await flushPendingIce();
            const answer = await state.pc.createAnswer();
            await state.pc.setLocalDescription(answer);
            await sendSignal('answer', answer);
            log('connection answer sent.');
        } else if (signal.type === 'answer') {
            await state.pc.setRemoteDescription(payload);
            await flushPendingIce();
            log('connection answer received.');
        } else if (signal.type === 'ice') {
            if (state.pc.remoteDescription) {
                await state.pc.addIceCandidate(payload);
            } else {
                state.pendingIce.push(payload);
            }
        }
    }

    async function flushPendingIce() {
        while (state.pendingIce.length && state.pc?.remoteDescription) {
            await state.pc.addIceCandidate(state.pendingIce.shift());
        }
    }

    function updateSendReadiness() {
        const ready = state.role === 'sender'
            && state.selectedFile
            && state.sharedKey
            && state.dc
            && state.dc.readyState === 'open'
            && !state.ended;
        els.sendFile.disabled = !ready;
        els.sendFile.classList.toggle('form-button-disabled', !ready);
    }

    async function waitForBuffer() {
        if (!state.dc || state.dc.bufferedAmount < 8 * 1024 * 1024) return;
        await new Promise(resolve => {
            state.dc.onbufferedamountlow = () => {
                state.dc.onbufferedamountlow = null;
                resolve();
            };
        });
    }

    async function waitForDrain() {
        if (!state.dc) return;
        while (state.dc.bufferedAmount > 0) {
            state.dc.bufferedAmountLowThreshold = 0;
            await new Promise(resolve => {
                const timeout = window.setTimeout(resolve, 750);
                state.dc.onbufferedamountlow = () => {
                    window.clearTimeout(timeout);
                    state.dc.onbufferedamountlow = null;
                    resolve();
                };
            });
        }
        state.dc.bufferedAmountLowThreshold = 2 * 1024 * 1024;
    }

    async function sendSelectedFile() {
        const file = state.selectedFile;
        if (!file || file.size > MAX_FILE_SIZE) return;

        els.sendFile.disabled = true;
        state.outgoingFile = file;
        setProgress(0, file.size, `sending ${file.name}...`);
        setStatus(`sending ${file.name}...`);
        const hasher = new Sha256();
        let chunksSent = 0;
        state.dc.send(JSON.stringify({
            kind: 'meta',
            name: file.name,
            size: file.size,
            type: file.type || 'application/octet-stream',
            lastModified: file.lastModified,
        }));

        let offset = 0;
        while (offset < file.size) {
            const chunk = await file.slice(offset, offset + CHUNK_SIZE).arrayBuffer();
            hasher.update(new Uint8Array(chunk));
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encrypted = new Uint8Array(await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, state.sharedKey, chunk));
            const frame = new Uint8Array(iv.length + encrypted.length);
            frame.set(iv, 0);
            frame.set(encrypted, iv.length);
            await waitForBuffer();
            state.dc.send(frame);
            chunksSent++;
            offset += chunk.byteLength;
            setProgress(offset, file.size, `${formatBytes(offset)} / ${formatBytes(file.size)}`, true);
        }

        const checksum = hasher.hex();
        state.dc.send(JSON.stringify({ kind: 'done', size: file.size, chunks: chunksSent, checksum }));
        await waitForDrain();
        setProgress(file.size, file.size, 'sent. verifying checksum...', true);
        setStatus('sent. verifying checksum...');
        log(`sent ${file.name}. checksum ${checksum}. waiting for receiver ack.`);
    }

    function queueReceivedMessage(event) {
        const data = event.data;
        state.receiveQueue = state.receiveQueue
            .then(() => receiveMessage(data))
            .catch(error => {
                setStatus(`receive failed: ${error.message}`);
                log(`receive failed: ${error.message}`);
                state.dc?.send(JSON.stringify({
                    kind: 'failed',
                    reason: error.message || 'receive failed',
                }));
            });
    }

    async function receiveMessage(data) {
        if (typeof data === 'string') {
            const message = JSON.parse(data);
            if (message.kind === 'meta') {
                await startReceive(message);
            } else if (message.kind === 'done') {
                if (state.receiving) {
                    state.receiving.expectedChecksum = message.checksum || null;
                    state.receiving.expectedChunks = Number.isFinite(Number(message.chunks)) ? Number(message.chunks) : null;
                    if (Number.isFinite(Number(message.size))) {
                        state.receiving.size = Number(message.size);
                    }
                }
                await finishReceive();
            } else if (message.kind === 'received') {
                const name = message.name || state.outgoingFile?.name || 'file';
                setSafeToClose(`${name} verified. safe to close this page.`);
                log(`receiver verified ${name}: ${message.checksum || 'checksum unavailable'}.`);
            } else if (message.kind === 'failed') {
                setStatus(`transfer failed: ${message.reason || 'checksum mismatch'}`);
                setProgress(0, 1, 'checksum failed.');
                log(`receiver rejected file: ${message.reason || 'checksum mismatch'}.`);
            }
            return;
        }

        if (!state.receiving || !state.sharedKey) return;
        const frame = new Uint8Array(data);
        const iv = frame.slice(0, 12);
        const ciphertext = frame.slice(12);
        const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, state.sharedKey, ciphertext);
        const plainBytes = new Uint8Array(plain);
        state.receiving.hasher.update(plainBytes);
        state.receiving.received += plainBytes.byteLength;
        state.receiving.chunksReceived++;
        if (state.receiving.writer) {
            await state.receiving.writer.write(plainBytes);
        } else {
            state.receiving.chunks.push(plain);
        }
        setProgress(
            state.receiving.received,
            state.receiving.size,
            `${formatBytes(state.receiving.received)} / ${formatBytes(state.receiving.size)}`
        );
    }

    async function startReceive(meta) {
        state.receiving = {
            name: meta.name || 'download.bin',
            type: meta.type || 'application/octet-stream',
            size: Number(meta.size) || 0,
            received: 0,
            chunksReceived: 0,
            chunks: [],
            hasher: new Sha256(),
            writer: null,
            handle: null,
            expectedChecksum: null,
            expectedChunks: null,
        };

        log(`incoming file: ${state.receiving.name} (${formatBytes(state.receiving.size)}).`);
        setProgress(0, state.receiving.size, `receiving ${state.receiving.name}...`);
        setStatus(`receiving ${state.receiving.name}...`);
        if (window.showSaveFilePicker) {
            const handle = await window.showSaveFilePicker({
                suggestedName: state.receiving.name,
                types: [{ description: 'file', accept: { [state.receiving.type]: ['.' + (state.receiving.name.split('.').pop() || 'bin')] } }],
            });
            state.receiving.handle = handle;
            state.receiving.writer = await handle.createWritable();
            log('streaming to disk.');
        } else if (state.receiving.size > 2 * 1024 * 1024 * 1024) {
            log('this browser cannot stream-save files. use chrome/edge for huge transfers.');
        }
    }

    async function finishReceive() {
        if (!state.receiving) return;
        const expected = state.receiving.expectedChecksum;
        const checksum = state.receiving.hasher.hex();
        const sizeMatches = state.receiving.received === state.receiving.size;
        const chunksMatch = state.receiving.expectedChunks === null || state.receiving.chunksReceived === state.receiving.expectedChunks;
        const checksumMatches = expected && checksum === expected;
        if (!sizeMatches || !chunksMatch || !checksumMatches) {
            if (state.receiving.writer) {
                await state.receiving.writer.abort();
            }
            state.dc?.send(JSON.stringify({
                kind: 'failed',
                name: state.receiving.name,
                reason: 'checksum mismatch',
                expected,
                actual: checksum,
                received: state.receiving.received,
                size: state.receiving.size,
                chunksReceived: state.receiving.chunksReceived,
                chunksExpected: state.receiving.expectedChunks,
            }));
            setStatus('checksum failed. transfer rejected.');
            setProgress(0, 1, 'checksum failed.');
            log(`checksum failed for ${state.receiving.name}: expected ${expected}, got ${checksum}.`);
            state.receiving = null;
            return;
        }

        if (state.receiving.writer) {
            await state.receiving.writer.close();
            log(`saved ${state.receiving.name}.`);
        } else {
            const blob = new Blob(state.receiving.chunks, { type: state.receiving.type });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = state.receiving.name;
            document.body.appendChild(link);
            link.click();
            link.remove();
            window.setTimeout(() => URL.revokeObjectURL(url), 30000);
            log(`downloaded ${state.receiving.name}.`);
        }
        state.dc?.send(JSON.stringify({ kind: 'received', name: state.receiving.name, checksum }));
        setSafeToClose(`${state.receiving.name} verified. safe to close this page.`);
        state.receiving = null;
    }

    els.createRoom.addEventListener('click', () => createRoom().catch(error => {
        els.createRoom.disabled = false;
        log(`create failed: ${error.message}`);
    }));

    els.copyLink.addEventListener('click', async () => {
        await navigator.clipboard.writeText(els.roomUrl.value);
        log('link copied.');
    });

    els.fileInput.addEventListener('change', () => {
        const file = els.fileInput.files?.[0] || null;
        if (file && file.size > MAX_FILE_SIZE) {
            log('file is over 100gb. nope.');
            setStatus('file is over 100gb.');
            els.fileInput.value = '';
            state.selectedFile = null;
            els.fileLabel.textContent = 'choose file';
        } else {
            state.selectedFile = file;
            if (file) {
                els.fileLabel.textContent = file.name;
                setStatus(`${file.name} selected.`);
                log(`selected ${file.name} (${formatBytes(file.size)}).`);
            } else {
                els.fileLabel.textContent = 'choose file';
            }
        }
        updateSendReadiness();
    });

    els.sendFile.addEventListener('click', () => sendSelectedFile().catch(error => {
        log(`send failed: ${error.message}`);
        updateSendReadiness();
    }));

    window.addEventListener('pagehide', notifyServerSessionEnded);
    window.addEventListener('beforeunload', notifyServerSessionEnded);

    if (state.token) {
        loadRoom().catch(error => {
            if (!handleApiError(error)) {
                log(`join failed: ${error.message}`);
            }
        });
    }
})();
</script>
