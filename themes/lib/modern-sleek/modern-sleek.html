<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{title} | fridge.dev</title>
    <meta name="description" content="{description}">
    <link rel="preload" href="/resources/IBM_VGA.woff" as="font" type="font/woff" crossorigin>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <link rel="icon" type="image/png" href="/resources/favicon-96x96.png" sizes="96x96" />
    <link rel="shortcut icon" href="/resources/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/resources/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="fridge.dev" />
    <link rel="manifest" href="/resources/site.webmanifest" />
</head>
<body class="modern-sleek-theme">
<span id="show-sidebar" data-tooltip="show sidebar" style="display:none"><i class="fa-solid fa-square-caret-right"></i></span>
<div id="page-wrapper">
<div id="sidebar">
    <div id="header">
        <span id="title" aria-label="fridge"><span class="title-letter" aria-hidden="true">f</span><span class="title-letter" aria-hidden="true">r</span><span class="title-letter" aria-hidden="true">i</span><span class="title-letter" aria-hidden="true">d</span><span class="title-letter" aria-hidden="true">g</span><span class="title-letter" aria-hidden="true">e</span></span>
        <br><span id="maintenance-banner" style="color: #4cc2ff; display: none;"><i class="fa-solid fa-hand"></i> <b>maintenance mode</b></span>
    </div>
    <a href="/feed"><div id="tab" data-tooltip="short snippets and updates">feed</div></a>
    <a href="/journal"><div id="tab" data-tooltip="long-form updates and blog posts">journal</div></a>
    <a href="/contact"><div id="tab" data-tooltip="send a contact message">contact</div></a>
    <a href="/guestbook"><div id="tab" data-tooltip="leave a message about the website">guestbook</div></a>
    <a href="/music"><div id="tab" data-tooltip="listen to my music">music</div></a>
    <a href="/gallery"><div id="tab" data-tooltip="a listing of all images uploaded to the site">gallery</div></a>
    <a href="/merch"><div id="tab" data-tooltip="buy some of my merch">merch</div></a>
    <a href="/bookmarks"><div id="tab" data-tooltip="all the stuff you've saved">saves</div></a>
    <a href="/tools"><div id="tab" data-tooltip="web tools and utilities">tools</div></a>
    <a href="/others"><div id="tab" data-tooltip="content that doesn't fit elsewhere">others</div></a>
    {user_greeting}
    <div id="sidebar-spacer"></div>
    <div id="mini-player-tracks"></div>
    <div id="mini-player" class="mini-inactive">
        <div id="mini-player-main">
            <div id="mini-player-art-wrapper"><img id="mini-player-art" src=""/><span id="mini-player-download" data-tooltip="download track"><i class="fa-solid fa-download"></i></span></div>
            <div id="mini-player-meta"><div id="mini-player-title"><span id="mini-player-title-inner">now playing: nothing</span></div><div id="mini-player-row"><span id="mini-player-play" data-tooltip="play / pause"><i class="fa-solid fa-play"></i></span><input id="mini-player-seek" type="range" min="0" max="0" value="0" step="0.1"></div></div>
            <div id="mini-player-controls"><span id="mini-player-volume-wrapper"><span id="mini-player-mute" data-tooltip="mute / unmute"><i class="fa-solid fa-volume-high"></i></span><input id="mini-player-volume" type="range" min="0" max="1" step="0.01" value="1"></span></div>
        </div>
        <audio id="mini-player-audio" preload="none"></audio>
    </div>
    <div id="sidebar-footer">
        <span id="footer-text">© <span id="footer-year"></span> fridge.dev</span>
        <script>document.getElementById('footer-year').textContent = new Date().getFullYear();</script>
        <div id="footer-buttons">
            <a href="/"><div id="footer-button" data-tooltip="go to homepage"><i class="fa-solid fa-home"></i></div></a>
            <a href="/discord"><div id="footer-button" data-tooltip="join the community discord"><i class="fa-brands fa-discord"></i></div></a>
            <a href="/account"><div id="footer-button" data-tooltip="access your fridge.dev account"><i class="fa-solid fa-user"></i></div></a>
            <a href="/settings"><div id="footer-button" data-tooltip="user settings"><i class="fa-solid fa-wrench"></i></div></a>
        </div>
    </div>
</div>
<div id="container"><div id="content"><div id="content-layout">
<noscript><span id="error">error - javascript disabled<br>javascript is required for this site to function properly.<br></span></noscript>
<div id="content-main">{content}</div>
<div id="content-footer"><span id="content-footer-views" data-tooltip="Counting unique user views per page, since 02/03/2026">...</span></div>
</div><script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script><script src="/main.js?v=20260714-8"></script></div></div>
</div>
</body>
</html>
