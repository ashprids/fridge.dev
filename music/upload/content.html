<h1>upload music</h1>
<br>
{music_upload_notice}
<form class="music-upload-form" action="/music/upload/" method="post" enctype="multipart/form-data" data-music-upload-form>
    <input type="hidden" name="music_upload_action" value="upload">
    <div class="music-upload-grid">
        <label>artist
            <select name="artist" required>
                {artist_options}
            </select>
        </label>
        <label>release type
            <select name="album_type" data-music-release-type required>
                {release_type_options}
            </select>
        </label>
        <label>release title
            <input type="text" name="album_name" value="{album_name}" required>
        </label>
        <label>cover art upload
            <input type="file" name="cover_art_upload" accept=".jpg,.jpeg,.png,.gif,.webp,image/*" required>
        </label>
        <label>caption
            <input type="text" name="album_caption" value="{album_caption}" placeholder="Released 2026">
        </label>
    </div>

    <div class="music-upload-tracks">
        <div class="music-upload-heading">tracks</div>
        <div data-music-track-list>
            {track_rows}
        </div>
        <button id="two-buttons" class="music-upload-action-button" type="button" data-music-add-track>add track</button>
    </div>

    <button id="form-button" class="music-upload-submit-button" type="submit">upload music</button>
</form>

<template data-music-track-template>
    <div class="music-upload-track" data-music-track-row>
        <div class="music-upload-track-handle" data-music-track-number>1</div>
        <label>track title
            <input type="text" name="track_names[]" required>
        </label>
        <label>audio file
            <input type="file" name="audio[]" accept=".mp3,.wav,.m4a,.ogg,.flac,audio/*" required>
        </label>
        <div class="music-upload-track-actions">
            <button id="two-buttons" class="music-upload-action-button" type="button" data-music-track-up>up</button>
            <button id="two-buttons" class="music-upload-action-button" type="button" data-music-track-down>down</button>
            <button id="two-buttons" class="music-upload-action-button" type="button" data-music-track-remove>remove</button>
        </div>
    </div>
</template>

<script>
(function() {
    const form = document.querySelector('[data-music-upload-form]');
    if (!form) return;
    const typeSelect = form.querySelector('[data-music-release-type]');
    const list = form.querySelector('[data-music-track-list]');
    const template = document.querySelector('[data-music-track-template]');
    const addButton = form.querySelector('[data-music-add-track]');
    if (!typeSelect || !list || !template || !addButton) return;

    const updateRows = () => {
        const rows = Array.from(list.querySelectorAll('[data-music-track-row]'));
        rows.forEach((row, index) => {
            const number = row.querySelector('[data-music-track-number]');
            const remove = row.querySelector('[data-music-track-remove]');
            const up = row.querySelector('[data-music-track-up]');
            const down = row.querySelector('[data-music-track-down]');
            if (number) number.textContent = String(index + 1);
            if (remove) remove.disabled = rows.length <= 1;
            if (up) up.disabled = index === 0;
            if (down) down.disabled = index === rows.length - 1;
        });
    };

    const addTrack = () => {
        const fragment = template.content.cloneNode(true);
        list.appendChild(fragment);
        updateRows();
    };

    if (!list.querySelector('[data-music-track-row]')) {
        addTrack();
    }

    addButton.addEventListener('click', () => {
        addTrack();
        const rows = list.querySelectorAll('[data-music-track-row]');
        const newest = rows[rows.length - 1];
        const title = newest ? newest.querySelector('input[type="text"]') : null;
        if (title) title.focus();
    });

    typeSelect.addEventListener('change', updateRows);
    list.addEventListener('click', event => {
        const button = event.target.closest('button');
        if (!button) return;
        const row = button.closest('[data-music-track-row]');
        if (!row) return;
        if (button.matches('[data-music-track-up]') && row.previousElementSibling) {
            list.insertBefore(row, row.previousElementSibling);
        } else if (button.matches('[data-music-track-down]') && row.nextElementSibling) {
            list.insertBefore(row.nextElementSibling, row);
        } else if (button.matches('[data-music-track-remove]')) {
            row.remove();
            if (!list.querySelector('[data-music-track-row]')) addTrack();
        }
        updateRows();
    });
    updateRows();
})();
</script>
