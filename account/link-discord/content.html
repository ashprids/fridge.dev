<h1>link discord</h1>
<h2>link your discord account to your fridge.dev account</h2>
<br>

<div id="error" style="{error_style}">{error_message}</div>
<div id="result" style="{success_style}">{success_message}</div>

<form method="post">
    <input type="hidden" name="csrf_token" value="{csrf_token}">
    <input id="textbox" name="discordUserId" type="text" placeholder="discord user id" value="{discord_user_id}" inputmode="numeric" autocomplete="off" required>
    <br><br>
    <button id="form-button" type="submit">link discord account</button>
</form>
