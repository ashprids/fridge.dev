<h1>edit @{account_username}</h1>
<h2>tweak the normal stuff here and yeet anything else through json.</h2>
<br>

<div id="error" style="{error_style}" data-alert-message="{error_alert_message}">{error_message}</div>
<div id="result" style="{success_style}">{success_message}</div>

<script>
window.addEventListener('DOMContentLoaded', function () {
    var errorEl = document.getElementById('error');
    if (!errorEl) return;

    var message = errorEl.getAttribute('data-alert-message') || '';
    if (message !== '') {
        if (window.showSiteNotice) {
            window.showSiteNotice('account edit failed', message);
        } else if (window.showSitePopup) {
            window.showSitePopup({title: 'account edit failed', detail: message, okText: 'ok'});
        }
    }
});
</script>

<form id="admin-account-form" method="post" action="/account/admin/edit/index.php?username={original_username}" data-no-spa="1">
    <input type="hidden" name="csrf_token" value="{csrf_token}">
    <input type="hidden" name="original_username" value="{original_username}">
    <input type="hidden" name="account_action" value="save">

    <input id="username" name="username" type="text" placeholder="username" value="{form_username}" autocomplete="off" required><br><br>
    <input id="name" name="name" type="text" placeholder="name" value="{form_name}" autocomplete="off" required><br><br>
    <input id="email-address" name="emailAddress" type="email" placeholder="fridge.dev email address" value="{form_email_address}" autocomplete="off"><br><br>

    <div class="checkbox-group">
        <label class="checkbox-label">
            <input type="checkbox" class="checkbox" name="isAdmin" value="1" {is_admin_checked}>
            <span>admin</span>
        </label>
        <label class="checkbox-label">
            <input type="checkbox" class="checkbox" name="postingRestricted" value="1" {posting_restricted_checked}>
            <span>restricted from posting</span>
        </label>
        <label class="checkbox-label">
            <input type="checkbox" class="checkbox" name="allowFeed" value="1" {allow_feed_checked}>
            <span>can post in /feed/</span>
        </label>
        <label class="checkbox-label">
            <input type="checkbox" class="checkbox" name="allowJournal" value="1" {allow_journal_checked}>
            <span>can post in /journal/</span>
        </label>
        <label class="checkbox-label">
            <input type="checkbox" class="checkbox" name="allowComments" value="1" {allow_comments_checked}>
            <span>can post comments</span>
        </label>
        <label class="checkbox-label">
            <input type="checkbox" class="checkbox" name="allowChat" value="1" {allow_chat_checked}>
            <span>can create/manage chats</span>
        </label>
        <label class="checkbox-label">
            <input type="checkbox" class="checkbox" name="resetPassword" value="1" {reset_password_checked}>
            <span>reset password to a random one on apply</span>
        </label>
    </div>

    <br>
    <label for="extra-json">other account values (json object)</label><br>
    <textarea id="extra-json" name="extra_json" rows="14" spellcheck="false">{extra_json}</textarea>
    <br><br>

    <button id="form-button" type="submit">apply changes</button>
</form>

<form id="admin-account-delete-feed-form" method="post" action="/account/admin/edit/index.php?username={original_username}" data-no-spa="1" data-site-confirm="1" data-admin-password-confirm="1" data-confirm-title="purge user content?" data-confirm-detail="this removes this user's feed posts, attached images, voice notes, and reply data. this cannot be undone." data-confirm-text="purge content" data-cancel-text="cancel" data-password-title="confirm purge" data-password-detail="enter your admin password to purge this user's content." novalidate>
    <input type="hidden" name="csrf_token" value="{csrf_token}">
    <input type="hidden" name="original_username" value="{original_username}">
    <input type="hidden" name="account_action" value="delete_feed_posts">
    <button class="danger-button" type="submit" name="delete_feed_posts" value="1" formnovalidate>purge user content</button>
</form>

<form id="admin-account-delete-form" method="post" action="/account/admin/edit/index.php?username={original_username}" data-no-spa="1" data-site-confirm="1" data-admin-password-confirm="1" data-delete-animation="account-rip" data-account-username="{account_username}" data-account-name="{account_name}" data-account-is-admin="{account_is_admin}" data-account-pages="{account_pages}" data-confirm-title="delete account?" data-confirm-detail="this cannot be undone." data-confirm-text="delete" data-cancel-text="cancel" data-password-title="confirm account deletion" data-password-detail="enter your admin password to delete this account." novalidate>
    <input type="hidden" name="csrf_token" value="{csrf_token}">
    <input type="hidden" name="original_username" value="{original_username}">
    <input type="hidden" name="account_action" value="delete">
    <button class="danger-button" type="submit" name="delete_account" value="1" formnovalidate {self_delete_disabled}>delete account</button>
</form>

<p><a href="/account/admin">back to account list</a></p>
