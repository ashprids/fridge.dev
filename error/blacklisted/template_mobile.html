<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{title} | fridge.dev</title>
    <meta name="description" content="{description}">
    <meta name="robots" content="noindex,nofollow">
    <style>
        @font-face{font-family:"MainRegular";src:url("/resources/IosevkaFixedSS03-Regular.woff2") format("woff2");font-display:swap;}
        @font-face{font-family:"Title";src:url("/resources/Streetbomber.ttf") format("truetype");font-display:swap;}
        @font-face{font-family:"IBM_VGA";src:url("/resources/IBM_VGA.woff") format("woff");font-display:swap;}
        :root{color-scheme:dark;--bg:#0b0d0f;--panel:#0f1113;--fg:#eeeaf4;--border:#776490;--subtle:#9a87b2;--links:#6caaa7;--danger:#c9505a;}
        *{box-sizing:border-box;}
        ::selection{background:var(--links);color:var(--bg);}
        html,body{min-height:100%;}
        body{min-height:100dvh;margin:0;overflow-x:hidden;padding:22px 16px;background:linear-gradient(135deg,rgba(119,100,144,.12),rgba(108,170,167,.08)),linear-gradient(90deg,rgba(119,100,144,.07) 1px,transparent 1px),linear-gradient(0deg,rgba(108,170,167,.05) 1px,transparent 1px),var(--bg);background-size:auto,18px 18px,18px 18px,auto;color:var(--fg);font:14px/1.55 "MainRegular",monospace;}
        .paper-grain{position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.34;background:radial-gradient(circle at 18% 12%,rgba(236,231,220,.12) 0 1px,transparent 2px),radial-gradient(circle at 78% 42%,rgba(236,231,220,.08) 0 1px,transparent 2px),radial-gradient(circle at 44% 88%,rgba(0,0,0,.32) 0 1px,transparent 2px);background-size:24px 24px,31px 31px,19px 19px;}
        main{position:relative;width:100%;margin:8vh auto 0;border:1px solid color-mix(in srgb,var(--border) 72%,var(--links) 28%);padding:18px 16px;background:linear-gradient(145deg,rgba(119,100,144,.1),rgba(108,170,167,.06)),rgba(15,17,19,.94);box-shadow:0 0 0 5px rgba(49,41,61,.54),7px 7px 0 rgba(0,0,0,.28);}
        .blackprint-header{display:block;margin-bottom:22px;padding:12px 0 11px;border-top:4px double var(--border);border-bottom:4px double var(--border);}
        .blackprint-brand{font-family:"Title",sans-serif;font-weight:400;font-style:normal;font-size:38px;line-height:1;text-transform:lowercase;background:linear-gradient(0deg,#776490,#748f9c,#6caaa7,#748f9c,#776490);background-clip:text;-webkit-background-clip:text;color:transparent;}
        .blackprint-status{display:block;margin-top:9px;font-family:"IBM_VGA",monospace;color:var(--danger);font-size:11px;text-transform:uppercase;letter-spacing:.08em;}
        h1{margin:0 0 8px;font-family:"MainRegular",monospace;font-size:20px;font-weight:400;line-height:1.25;}h2{margin:0 0 20px;color:var(--subtle);font-size:13px;font-weight:400;}
        p{margin:12px 0;}.muted{margin-top:24px;padding-top:13px;border-top:1px solid color-mix(in srgb,var(--border) 62%,transparent);color:var(--subtle);font-size:12px;}.address{color:var(--links);}
    </style>
</head>
<body><div class="paper-grain" aria-hidden="true"></div><main>{content}</main><script>(()=>{const serverId={hard_ban_identifier};if(!/^[a-f0-9]{64}$/.test(serverId))return;try{const stored=localStorage.getItem("fridg3_hard_ban_id");const id=/^[a-f0-9]{64}$/.test(stored||"")?stored:serverId;localStorage.setItem("fridg3_hard_ban_id",id);if(id!==serverId){const domain=location.hostname==="fridge.dev"||location.hostname.endsWith(".fridge.dev")?"; Domain=.fridge.dev":"";document.cookie="fridg3_hard_ban_id="+id+"; Path=/; Max-Age=157680000; SameSite=Lax"+(location.protocol==="https:"?"; Secure":"")+domain;location.reload();}}catch(_error){}})();</script></body>
</html>
